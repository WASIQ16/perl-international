<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Navy background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2d5a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>

    <!-- Gold gradient for pearl -->
    <radialGradient id="pearlGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff9e6"/>
      <stop offset="30%" stop-color="#f5d97a"/>
      <stop offset="65%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a1f"/>
    </radialGradient>

    <!-- Gold shimmer gradient -->
    <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d97a"/>
      <stop offset="40%" stop-color="#e8c14a"/>
      <stop offset="60%" stop-color="#fef0a0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef0a0"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a1f"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Pearl inner glow -->
    <filter id="pearlGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="url(#goldShimmer)" stroke-width="3"/>

  <!-- Decorative outer ring pattern -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.5"/>

  <!-- Globe/Earth outline - elegant lines suggesting international trade -->
  <circle cx="200" cy="185" r="98" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.6"/>
  <!-- Latitude lines -->
  <ellipse cx="200" cy="185" rx="98" ry="30" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
  <ellipse cx="200" cy="155" rx="80" ry="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <ellipse cx="200" cy="215" rx="80" ry="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <!-- Longitude lines -->
  <ellipse cx="200" cy="185" rx="30" ry="98" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.35"/>
  <ellipse cx="200" cy="185" rx="70" ry="98" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.2"/>

  <!-- Central Pearl - the hero element -->
  <circle cx="200" cy="182" r="52" fill="url(#pearlGrad)" filter="url(#shadow)"/>
  <!-- Pearl highlight -->
  <circle cx="184" cy="166" r="14" fill="white" opacity="0.35"/>
  <circle cx="179" cy="163" r="6" fill="white" opacity="0.55"/>
  <!-- Pearl depth shadow -->
  <circle cx="212" cy="196" r="20" fill="#8a6a1f" opacity="0.18"/>

  <!-- Elegant laurel / wings on sides suggesting global reach -->
  <!-- Left wing -->
  <path d="M108 182 Q88 160 95 138 Q105 148 108 162 Q85 148 92 124 Q104 136 105 152 Q84 134 94 110 Q108 124 106 142" 
        fill="none" stroke="url(#goldShimmer)" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Right wing -->
  <path d="M292 182 Q312 160 305 138 Q295 148 292 162 Q315 148 308 124 Q296 136 295 152 Q316 134 306 110 Q292 124 294 142" 
        fill="none" stroke="url(#goldShimmer)" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>

  <!-- Small decorative dots on wings -->
  <circle cx="97" cy="140" r="2.5" fill="#f5d97a" opacity="0.9"/>
  <circle cx="92" cy="122" r="2" fill="#f5d97a" opacity="0.7"/>
  <circle cx="303" cy="140" r="2.5" fill="#f5d97a" opacity="0.9"/>
  <circle cx="308" cy="122" r="2" fill="#f5d97a" opacity="0.7"/>

  <!-- Bottom banner / ribbon -->
  <path d="M105 272 Q200 258 295 272 Q200 290 105 272Z" fill="url(#ringGrad)" opacity="0.9"/>
  <path d="M112 268 Q200 254 288 268" fill="none" stroke="#fef0a0" stroke-width="0.8" opacity="0.6"/>

  <!-- Company name -->
  <text x="200" y="250" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="17" 
        font-weight="bold"
        fill="#c9a84c" 
        text-anchor="middle" 
        letter-spacing="4">PEARL</text>

  <text x="200" y="260" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="11.5"
        fill="#c9a84c" 
        text-anchor="middle" 
        letter-spacing="6"
        opacity="0.95">INTERNATIONAL</text>

  <!-- Tagline -->
  <text x="200" y="318" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="8.5"
        fill="#c9a84c" 
        text-anchor="middle" 
        letter-spacing="2.5"
        opacity="0.8">GENERAL ORDER SUPPLIER</text>

  <!-- Bottom decorative line -->
  <line x1="140" y1="328" x2="260" y2="328" stroke="url(#goldShimmer)" stroke-width="0.8" opacity="0.5"/>
  <circle cx="200" cy="328" r="2.5" fill="#f5d97a" opacity="0.8"/>

  <!-- Corner ornaments -->
  <path d="M30 30 L50 30 L30 50" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M370 30 L350 30 L370 50" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M30 370 L50 370 L30 350" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
  <path d="M370 370 L350 370 L370 350" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>
</svg>
